tags:
  - Contacts
summary: Get all contacts
operationId: getContacts
security:
  - bearerAuth: []

parameters:
  - in: query
    name: page
    schema:
      type: integer
      example: 1

  - in: query
    name: perPage
    schema:
      type: integer
      example: 5

responses:
  '200':
    description: List of contacts
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../components/schemas/contact.yaml'
